<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculation</title>

    <link rel="stylesheet" href="style4.css">
</head>
<body>
<div class = "mainBox">
  <div class = "corpus">
      <img src="icons/floweror (1).png" width="66px">
      <img src="icons/morning-glory.png" width="65px">
      <img src="icons/flower.png" width="65px">
      <img src="icons/daisy.png" width="65px">
      <img src="icons/lily.png" width="65px">
    <div id="display">0</div>
    <div class="all-buttons">
        <button id="clear" class="buttoN operators-btn"> c </button>
        <button id="btn-click" class="buttoN operators-btn"> % </button>
        <button id="btn-click" class="buttoN operators-btn">/</button>
        <button id="btn-click" class="buttoN operators-btn">x</button>
        <button id="btn-click" class="buttoN">1</button>
        <button id="btn-click" class="buttoN">2</button>
        <button id="btn-click" class="buttoN">3</button>
        <button id="btn-click" class="buttoN operators-btn">-</button>
        <button id="btn-click" class="buttoN">4</button>
        <button id="btn-click" class="buttoN">5</button>
        <button id="btn-click" class="buttoN">6</button>
        <button id="btn-click" class="buttoN operators-btn">+</button>
        <button id="btn-click" class="buttoN">7</button>
        <button id="btn-click" class="buttoN">8</button>
        <button id="btn-click" class="buttoN">9</button>
        <button id="btn-click" class="buttoN operators-btn">.</button>
        <button id="btn-click" class="buttoN">0</button>
        <button id="negative" class="buttoN operators-btn">+/-</button>
        <button id="btn-click" class="buttoN bigButton operators-btn">=</button>
    </div>
  </div>
</div>



    <script src="script4.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/big.js@7.0.1/big.min.js"></script> -->

</body>
</html>
